<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>QuizNoppo v1.5</title>
<style>
:root{--navy:#0b2c62;--red:#e50036;--yellow:#ffd54b;--green:#2e9b55;--bg:#fffaf1;--line:#dfe4ec;--text:#172033}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif;background:linear-gradient(#fffdf8,#f3f6fb);color:var(--text)}
button,select,textarea,input{font:inherit}.app{max-width:1180px;margin:auto;padding:16px 16px 96px}
header{display:flex;justify-content:space-between;align-items:center;gap:14px;border-bottom:3px solid var(--red);padding:8px 2px 14px;margin-bottom:20px}
.brand{display:flex;align-items:center}
.logo-cute{display:flex;align-items:center;gap:2px;font-weight:1000;letter-spacing:-3px;line-height:1;filter:drop-shadow(0 3px 0 rgba(11,44,98,.08))}
.logo-quiz,.logo-noppo{font-size:clamp(36px,6vw,62px);-webkit-text-stroke:3px var(--navy);paint-order:stroke fill}
.logo-quiz{color:#fff}
.logo-noppo{color:#ffc83f}
.logo-giraffe{display:inline-block;width:46px;height:62px;margin-left:4px;transform:translateY(3px)}
.logo-giraffe svg{width:100%;height:100%}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.btn{border:0;border-radius:999px;padding:11px 16px;font-weight:800;cursor:pointer;background:var(--navy);color:#fff}
.btn.red{background:var(--red)}.btn.light{background:#fff;color:var(--navy);border:2px solid var(--navy)}
.layout{display:grid;grid-template-columns:minmax(0,1fr) clamp(118px,24vw,300px);gap:14px;align-items:start}.card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 10px 30px rgba(20,40,75,.08)}
.topline{display:flex;gap:10px;flex-wrap:wrap}.pill{border-radius:999px;padding:8px 14px;font-weight:800;background:#eef3fb;color:var(--navy)}.pill.topic{background:#fff0bd;color:#725100}
.question{font-weight:900;font-size:clamp(22px,3.2vw,34px);line-height:1.45;margin:18px 0}.choices{display:grid;gap:12px}
.choice{display:flex;gap:14px;width:100%;text-align:left;padding:16px;border:2px solid var(--line);border-radius:18px;background:#fff;cursor:pointer}
.choice:hover{border-color:#9eabc0}.letter{min-width:38px;height:38px;border-radius:50%;background:#eef2f7;display:grid;place-items:center;color:var(--navy);font-size:20px;font-weight:900}
.choice.correct{border-color:var(--green);background:#eefaf2}.choice.correct .letter{background:var(--green);color:#fff}.choice.wrong{border-color:var(--red);background:#fff0f3}.choice.wrong .letter{background:var(--red);color:#fff}
.feedback{display:none;margin-top:18px;padding:18px;border-radius:18px;line-height:1.75}.feedback.show{display:block}.feedback.good{background:#eefaf2;border:1px solid #bbdfc6}.feedback.bad{background:#fff0f3;border:1px solid #f2bac7}
.navrow{display:flex;justify-content:space-between;gap:10px;margin-top:20px}.gauge-card{text-align:center;position:sticky;top:8px;height:calc(100vh - 16px);min-height:520px;display:flex;flex-direction:column;align-items:center;overflow:hidden;padding:14px 10px;border:3px solid var(--yellow);background:#fffdf2}
.gauge-title{font-size:20px;font-weight:900;color:var(--red)}.height{font-size:34px;font-weight:900;color:var(--red);margin:5px}

.gauge{position:relative;width:150px;height:min(520px,calc(100vh - 210px));min-height:380px;margin:12px auto 0;border:3px solid var(--yellow);border-radius:65px 65px 24px 24px;background:linear-gradient(#fff7cc,#fff);overflow:hidden}
.fill{position:absolute;bottom:24px;left:45px;width:36px;height:0;background:linear-gradient(#ff7958,var(--red));border-radius:18px 18px 4px 4px;transition:.45s;height .45s}
.animal{position:absolute;left:19px;bottom:18px;width:108px;height:122px;transition:bottom .45s;z-index:3;filter:drop-shadow(0 5px 6px rgba(43,34,12,.16))}
.animal svg{width:100%;height:100%;overflow:visible}
.gauge:before{content:"";position:absolute;left:74px;top:22px;bottom:22px;width:3px;background:repeating-linear-gradient(to bottom,#c89920 0 2px,transparent 2px 48px);opacity:.45}
.gauge:after{content:"10m\A 8m\A 6m\A 4m\A 2m\A 0m";white-space:pre;position:absolute;right:7px;top:28px;bottom:25px;display:flex;flex-direction:column;justify-content:space-between;font-size:11px;font-weight:900;color:#81631a;line-height:1}

@media(max-width:820px){
  .app{padding:8px 8px 92px}
  header{align-items:flex-start;margin-bottom:10px}
  .logo{font-size:34px}
  .tag{font-size:9px}
  .actions{gap:5px}
  .btn{padding:9px 11px;font-size:13px}
  .layout{grid-template-columns:minmax(0,1fr) 150px;gap:8px}
  .card{padding:13px;border-radius:17px}
  .gauge-card{position:sticky;top:6px;height:calc(100vh - 12px);min-height:500px;padding:10px 5px}
  .gauge-title{font-size:16px}
  .height{font-size:25px}
  
  .gauge{width:108px;height:calc(100vh - 205px);min-height:300px}
  .animal{left:0px;width:104px;height:118px}
  .gauge:before{left:53px}
  .gauge:after{right:2px;font-size:9px}
  .question{font-size:21px}
  .choice{padding:12px 9px;gap:8px}
  .letter{min-width:31px;height:31px;font-size:16px}
  .navrow{flex-wrap:wrap}
  .help{font-size:11px}
}
@media(max-width:480px){
  header .actions{display:none}
  .layout{grid-template-columns:minmax(0,1fr) 116px;gap:6px}
  .card{padding:10px;border-radius:14px}
  .gauge-card{padding:8px 3px}
  .gauge-title{font-size:14px}
  .height{font-size:22px}
  #scoreMini{font-size:10px;padding:6px}
  
  .gauge{width:96px;height:calc(100vh - 190px);min-height:290px}
  .animal{left:-4px;width:100px;height:114px}
  .gauge:before{left:47px}
  .question{font-size:18px;margin:12px 0}
  .choice{font-size:14px}
  .pill{font-size:11px;padding:6px 8px}
}

.animal-name{width:100%;padding:9px 12px;border:2px solid var(--line);border-radius:999px;background:#fff;font-weight:900;color:var(--navy);margin:8px 0}
.gauge-copy{font-size:14px;font-weight:800;line-height:1.5;color:#725100;margin:4px 0 2px}
.gauge-card{background:linear-gradient(#fffef5,#fff8cf)}
.gauge{background:
  radial-gradient(circle at 20% 22%,#dff3ff 0 16px,transparent 17px),
  radial-gradient(circle at 72% 36%,#e8f6ff 0 14px,transparent 15px),
  linear-gradient(#fff9dd,#fffef5);
}
.gauge::before{opacity:.25}

</style>
</head>
<body>
<div class="app">
<header>
  <div class="brand">
      <div class="logo-cute">
        <span class="logo-quiz">Quiz</span><span class="logo-noppo">Noppo</span>
        <span class="logo-giraffe" aria-hidden="true">
          <svg viewBox="0 0 64 84">
            <ellipse cx="32" cy="38" rx="22" ry="20" fill="#ffd85a" stroke="#d69a22" stroke-width="3"/>
            <rect x="26" y="52" width="12" height="28" rx="6" fill="#ffd85a" stroke="#d69a22" stroke-width="3"/>
            <rect x="18" y="6" width="6" height="18" rx="3" fill="#f4bd35"/>
            <rect x="40" y="6" width="6" height="18" rx="3" fill="#f4bd35"/>
            <circle cx="21" cy="7" r="5" fill="#9b681e"/>
            <circle cx="43" cy="7" r="5" fill="#9b681e"/>
            <ellipse cx="11" cy="35" rx="9" ry="6" fill="#ffd85a" stroke="#d69a22" stroke-width="3"/>
            <ellipse cx="53" cy="35" rx="9" ry="6" fill="#ffd85a" stroke="#d69a22" stroke-width="3"/>
            <circle cx="24" cy="37" r="3.5" fill="#2d231b"/>
            <circle cx="40" cy="37" r="3.5" fill="#2d231b"/>
            <circle cx="23" cy="36" r="1.2" fill="#fff"/>
            <circle cx="39" cy="36" r="1.2" fill="#fff"/>
            <ellipse cx="32" cy="48" rx="12" ry="8" fill="#fff0b5"/>
            <path d="M25 50 Q32 57 39 50" fill="none" stroke="#7b551f" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="29" cy="65" r="3" fill="#b87823"/>
            <circle cx="35" cy="74" r="3" fill="#b87823"/>
          </svg>
        </span>
      </div>
    </div>
  <div class="actions">
    <button class="btn light" id="importBtn">問題を読み込む</button>
    <button class="btn" id="restartBtn">最初から</button>
  </div>
</header>

<section id="importPanel" class="card import">
  <h2>問題データを読み込む</h2>
  <p class="help">下の形式で貼り付けて「読み込む」を押してください。複数問を続けて記述できます。</p>
  <textarea id="importText"></textarea>
  <div class="actions" style="margin-top:12px;justify-content:flex-start">
    <button class="btn red" id="loadBtn">この問題を読み込む</button>
    <button class="btn light" id="sampleBtn">鉄道サンプルを入れる</button>
    <button class="btn light" id="closeImportBtn">閉じる</button>
  </div>
</section>

<div class="layout">
<main class="card" id="quizCard">
  <div class="topline"><div class="pill" id="progress">問題 1 / 5</div><div class="pill topic" id="topic">鉄道クイズ</div></div>
  <div class="question" id="question"></div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  <div class="navrow">
    <button class="btn light" id="prevBtn">← 前の問題</button>
    <button class="btn red" id="nextBtn">次の問題 →</button>
  </div>
</main>

<aside class="card gauge-card">
  <div class="gauge-title">✨ ノッポゲージ ✨</div><div class="gauge-copy">キリンといっしょに<br>どんどんノッポになろう！</div><div style="font-size:10px;font-weight:800;color:#81631a;margin-top:2px">右側固定</div>
  <div class="height" id="heightText">0.0 m</div><div class="pill" id="scoreMini">正解 0 / 5</div>
  <div class="animal-name">🦒 キリン</div>
  <div class="gauge">
    <div class="fill" id="fill"></div>
    <div class="animal" id="animal">
      <div id="giraffe" aria-label="キリン">
        <svg viewBox="0 0 140 160" role="img">
          <defs>
            <linearGradient id="cuteBody" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#ffe66b"/>
              <stop offset="1" stop-color="#ffc83d"/>
            </linearGradient>
            <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
              <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#9d6a16" flood-opacity=".22"/>
            </filter>
          </defs>

          <g filter="url(#softShadow)">
            <!-- long soft neck -->
            <rect x="53" y="70" width="34" height="78" rx="17"
                  fill="url(#cuteBody)" stroke="#d99a22" stroke-width="3"/>

            <!-- body spots -->
            <ellipse cx="62" cy="86" rx="7" ry="6" fill="#b87924"/>
            <ellipse cx="78" cy="102" rx="6" ry="7" fill="#b87924"/>
            <ellipse cx="63" cy="121" rx="6" ry="5" fill="#b87924"/>
            <ellipse cx="78" cy="137" rx="6" ry="5" fill="#b87924"/>

            <!-- ears -->
            <ellipse cx="31" cy="57" rx="18" ry="12" transform="rotate(-20 31 57)"
                     fill="#ffd84f" stroke="#d99a22" stroke-width="3"/>
            <ellipse cx="109" cy="57" rx="18" ry="12" transform="rotate(20 109 57)"
                     fill="#ffd84f" stroke="#d99a22" stroke-width="3"/>
            <ellipse cx="31" cy="57" rx="10" ry="6" transform="rotate(-20 31 57)"
                     fill="#e5a733"/>
            <ellipse cx="109" cy="57" rx="10" ry="6" transform="rotate(20 109 57)"
                     fill="#e5a733"/>

            <!-- short cute ossicones -->
            <rect x="45" y="18" width="10" height="24" rx="5" fill="#f8c63d"/>
            <rect x="85" y="18" width="10" height="24" rx="5" fill="#f8c63d"/>
            <circle cx="50" cy="18" r="8" fill="#9f681f"/>
            <circle cx="90" cy="18" r="8" fill="#9f681f"/>

            <!-- big round head -->
            <ellipse cx="70" cy="62" rx="46" ry="40"
                     fill="url(#cuteBody)" stroke="#d99a22" stroke-width="3"/>

            <!-- forehead spots -->
            <ellipse cx="52" cy="41" rx="7" ry="6" fill="#b87924"/>
            <ellipse cx="75" cy="36" rx="6" ry="5" fill="#b87924"/>
            <ellipse cx="93" cy="47" rx="7" ry="6" fill="#b87924"/>

            <!-- eyes -->
            <ellipse cx="52" cy="61" rx="7" ry="9" fill="#2c2118"/>
            <ellipse cx="88" cy="61" rx="7" ry="9" fill="#2c2118"/>
            <circle cx="49" cy="57" r="2.6" fill="#fff"/>
            <circle cx="85" cy="57" r="2.6" fill="#fff"/>

            <!-- rosy cheeks -->
            <ellipse cx="40" cy="76" rx="9" ry="6" fill="#ff9e9e" opacity=".7"/>
            <ellipse cx="100" cy="76" rx="9" ry="6" fill="#ff9e9e" opacity=".7"/>

            <!-- muzzle -->
            <ellipse cx="70" cy="82" rx="25" ry="18"
                     fill="#fff0ad" stroke="#e3b547" stroke-width="2"/>
            <ellipse cx="61" cy="79" rx="3" ry="2.5" fill="#7c5520"/>
            <ellipse cx="79" cy="79" rx="3" ry="2.5" fill="#7c5520"/>

            <!-- smile -->
            <path d="M58 87 Q70 98 82 87"
                  fill="none" stroke="#7c5520" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M70 91 Q70 98 76 99"
                  fill="none" stroke="#e26d6d" stroke-width="2.5" stroke-linecap="round"/>

            <!-- tiny bow tie -->
            <path d="M55 105 L69 112 L55 119 Z" fill="#e50036"/>
            <path d="M85 105 L71 112 L85 119 Z" fill="#e50036"/>
            <circle cx="70" cy="112" r="6" fill="#b7002b"/>
          </g>
        </svg>
      </div></div>
      </div>
    </div>
  </div>
  <p class="help">正解するたびに動物が上へ。クイズ中も右側で進み具合を確認できます。</p>
</aside>
</div>
</div>

<nav class="bottom">
<button id="navQuiz">🚆 クイズ</button>
<button id="navImport">📥 読み込み</button>
<button id="navAnimal">🦒 キリン</button>
</nav>

<script>
const railwayQuestions = [
 {topic:"鉄道クイズ",q:"日本で最初に鉄道が正式開業した区間はどれ？",choices:["新橋―横浜","東京―上野","大阪―神戸","京都―大阪"],answer:0,explanation:"1872年、新橋と横浜の間で日本初の鉄道が正式開業しました。"},
 {topic:"鉄道クイズ",q:"新幹線の愛称「のぞみ」が最初に登場した路線は？",choices:["東海道新幹線","東北新幹線","上越新幹線","九州新幹線"],answer:0,explanation:"「のぞみ」は1992年に東海道新幹線で運転を開始しました。"},
 {topic:"鉄道クイズ",q:"鉄道の線路の幅を表す言葉は？",choices:["ホーム幅","軌間","車幅","路肩"],answer:1,explanation:"2本のレールの内側どうしの間隔を「軌間」といいます。"},
 {topic:"鉄道クイズ",q:"駅で列車の進行方向を変えるために使われる線路設備は？",choices:["転車台","分岐器","架線柱","踏切"],answer:1,explanation:"分岐器はポイントとも呼ばれ、列車を別の線路へ進ませる設備です。"},
 {topic:"鉄道クイズ",q:"電車が外部から電気を受け取る装置はどれ？",choices:["パンタグラフ","連結器","台車","排障器"],answer:0,explanation:"パンタグラフは架線から電気を取り入れる装置です。"}
];

let questions = [...railwayQuestions], index=0, answered={}, score=0;
const $=id=>document.getElementById(id);
const letters=["A","B","C","D","E","F"];

function render(){
 const q=questions[index];
 $("progress").textContent=`問題 ${index+1} / ${questions.length}`;
 $("scoreMini").textContent=`正解 ${score} / ${questions.length}`;
 $("topic").textContent=q.topic||"クイズ";
 $("question").textContent=q.q;
 $("choices").innerHTML="";
 q.choices.forEach((text,i)=>{
   const b=document.createElement("button"); b.className="choice";
   b.innerHTML=`<span class="letter">${letters[i]}</span><span>${escapeHtml(text)}</span>`;
   if(answered[index]!==undefined){
     b.classList.add("locked");
     if(i===q.answer)b.classList.add("correct");
     if(i===answered[index] && i!==q.answer)b.classList.add("wrong");
   } else b.onclick=()=>answer(i);
   $("choices").appendChild(b);
 });
 const fb=$("feedback");
 if(answered[index]!==undefined){
   const ok=answered[index]===q.answer;
   fb.className=`feedback show ${ok?"good":"bad"}`;
   fb.innerHTML=`<strong>${ok?"正解！":"不正解"}</strong><br>${escapeHtml(q.explanation||"")}`;
 } else {fb.className="feedback";fb.innerHTML="";}
 $("prevBtn").disabled=index===0;
 $("nextBtn").textContent=index===questions.length-1?"結果を見る":"次の問題 →";
 updateGauge();
}
function answer(i){answered[index]=i;if(i===questions[index].answer)score++;render()}
function next(){
 if(index<questions.length-1){index++;render()}else showResult()
}
function showResult(){
 $("quizCard").innerHTML=`<div class="result"><h2>結果</h2><div class="score">${score} / ${questions.length}</div><p>ノッポゲージは ${height().toFixed(1)} m まで伸びました。</p><button class="btn red" onclick="restart()">もう一度挑戦</button></div>`;
}
function restart(){index=0;answered={};score=0;location.reload()}
function height(){return score*1.8}
function updateGauge(){
 const ratio=questions.length?score/questions.length:0;
 const gauge=document.querySelector(".gauge");
 const max=gauge.clientHeight-110;
 $("fill").style.height=`${Math.max(0,max*ratio)}px`;
 $("animal").style.bottom=`${22+Math.max(0,max*ratio)}px`;
 $("heightText").textContent=`${height().toFixed(1)} m`;
 $("scoreMini").textContent=`正解 ${score} / ${questions.length}`;
}
function setAnimal(){ /* キリン固定 */ }
function parseText(text){
 const blocks=text.split(/\n(?=#\s*Q|\n---+\n)/g).map(s=>s.trim()).filter(Boolean);
 const out=[];
 for(const block of blocks){
   const topic=(block.match(/Topic:\s*(.+)/i)||[])[1]||"読み込みクイズ";
   const q=(block.match(/Q:\s*(.+)/i)||[])[1];
   const choiceLines=[...block.matchAll(/^\s*-\s*([A-F])[:：]\s*(.+)$/gmi)];
   const ans=((block.match(/Answer:\s*([A-F])/i)||[])[1]||"A").toUpperCase();
   const explanation=(block.match(/Explanation:\s*([\s\S]*)/i)||[])[1]?.trim()||"";
   if(q && choiceLines.length>=2) out.push({topic,q,choices:choiceLines.map(m=>m[2].trim()),answer:letters.indexOf(ans),explanation});
 }
 return out;
}
function loadText(){
 const parsed=parseText($("importText").value);
 if(!parsed.length){alert("問題を読み取れませんでした。サンプル形式を確認してください。");return}
 questions=parsed;index=0;answered={};score=0;$("importPanel").classList.remove("show");render();
}
function sampleText(){
 $("importText").value=`# Q1
Topic: 鉄道クイズ
Q: 日本で最初に鉄道が正式開業した区間はどれ？
- A: 新橋―横浜
- B: 東京―上野
- C: 大阪―神戸
- D: 京都―大阪
Answer: A
Explanation: 1872年、新橋と横浜の間で日本初の鉄道が正式開業しました。

# Q2
Topic: 鉄道クイズ
Q: 鉄道の線路の幅を表す言葉は？
- A: ホーム幅
- B: 軌間
- C: 車幅
- D: 路肩
Answer: B
Explanation: 2本のレールの内側どうしの間隔を「軌間」といいます。`;
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
$("nextBtn").onclick=next;$("prevBtn").onclick=()=>{if(index>0){index--;render()}};
$("importBtn").onclick=$("navImport").onclick=()=>$("importPanel").classList.toggle("show");
$("closeImportBtn").onclick=()=>$("importPanel").classList.remove("show");
$("loadBtn").onclick=loadText;$("sampleBtn").onclick=sampleText;
$("restartBtn").onclick=()=>location.reload();


$("navAnimal").onclick=()=>document.querySelector(".gauge-card").scrollIntoView({behavior:"smooth",block:"center"});
$("navQuiz").onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

window.addEventListener("resize",updateGauge);render();
</script>
</body>
</html>
